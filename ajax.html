  <main>
    <section class="p-5 hero-section text-white text-center">
      <div class="container">
        <h1 class="display-4 fw-bold">AJAX Example</h1>
        <p class="lead">Fetch data from PokeAPI using Vanilla JavaScript</p>
      </div>
    </section>

    <section class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-body text-center">
              <h3 class="card-title mb-4">Pokemon Data Fetcher</h3>
              <button id="fetchData" class="btn btn-primary mb-3">Fetch Ditto Data</button>
              <div id="pokemonData"></div>
            </div>
          </div>
        </div>
      </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const fetchBtn = document.getElementById('fetchData');
      const pokemonData = document.getElementById('pokemonData');
      fetchBtn.addEventListener('click', function() {
        fetch('https://pokeapi.co/api/v2/pokemon/ditto')
          .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
          })
          .then(data => {
            pokemonData.innerHTML = `
              <div class="alert alert-success">
                <h5>Pokemon ID: ${data.id}</h5>
                <h5>Pokemon Name: ${data.forms[0].name}</h5>
              </div>
            `;
          })
          .catch(error => {
            console.error('Fetch error:', error);
            pokemonData.innerHTML = '<div class="alert alert-danger">Failed to fetch data!</div>';
          });
      });
    });
  </script>
  <script>
    (function() {
      const html = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      const navbar = document.getElementById('mainNav');
      const stored = localStorage.getItem('theme');
      function updateNavbarTheme(theme) {
        if (theme === 'dark') {
          navbar.classList.remove('bg-light', 'navbar-light');
          navbar.classList.add('bg-dark', 'navbar-dark');
        } else {
          navbar.classList.remove('bg-dark', 'navbar-dark');
          navbar.classList.add('bg-light', 'navbar-light');
        }
      }
      if (stored) {
        html.setAttribute('data-bs-theme', stored);
        toggle.textContent = stored === 'dark' ? 'Dark' : 'Light';
        updateNavbarTheme(stored);
      } else {
        toggle.textContent = 'Light';
        updateNavbarTheme('light');
      }
      toggle.addEventListener('click', function() {
        const current = html.getAttribute('data-bs-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-bs-theme', next);
        localStorage.setItem('theme', next);
        toggle.textContent = next === 'dark' ? 'Dark' : 'Light';
        updateNavbarTheme(next);
      });
    })();
  </script>
</body>
